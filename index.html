/* Кнопка в самом низу */
.btn-wrap {
  position: fixed;
  bottom: 28px;
  left: 28px; right: 28px;
  z-index: 10;
  display: flex;
  justify-content: center;
}

.btn-register {
  width: 100%;
  max-width: 340px;
  padding: 15px 20px;
  background: rgba(15, 60, 8, 0.18);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: 1px solid rgba(180, 240, 130, 0.25);
  border-radius: 14px;
  color: rgba(255, 255, 255, 0.85);
  font-family: 'Cinzel', serif;
  font-size: 16px;
  letter-spacing: 5px;
  text-transform: uppercase;
  cursor: pointer;
  text-shadow: 0 1px 8px rgba(0,0,0,0.6);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
  transition: background .2s, transform .15s;
}
.btn-register:active {
  transform: scale(.97);
  background: rgba(15,60,8,0.32);
}
.btn-register:disabled {
  color: rgba(255,255,255,0.3);
  border-color: rgba(255,255,255,0.1);
  cursor: not-allowed;
}

/* OVERLAY */
#overlay {
  display:none; position:fixed; inset:0; z-index:100;
  background:linear-gradient(180deg,#0a1e0a,#0f2e0f);
  overflow-y:auto;
}
.ov-inner {
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; padding:50px 24px 60px;
}
.ov-badge {
  font-family:'Cinzel',serif; font-size:11px; letter-spacing:4px;
  text-transform:uppercase; color:rgba(120,200,70,0.6); margin-bottom:16px;
}
.ov-title {
  font-family:'Georgia',serif; font-size:28px; font-style:italic;
  color:#e8f5e0; text-align:center; line-height:1.35; margin-bottom:28px;
}
.form-card {
  width:100%; max-width:340px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(120,200,70,0.12);
  border-radius:20px; padding:24px 20px;
  display:flex; flex-direction:column; gap:16px; margin-bottom:20px;
}
.field { display:flex; flex-direction:column; gap:7px; }
.field label {
  font-family:'Cinzel',serif; font-size:10px; letter-spacing:2.5px;
  text-transform:uppercase; color:rgba(120,200,70,0.55);
}
.field input {
  padding:14px 16px; border:1.5px solid rgba(120,200,70,0.18);
  border-radius:12px; font-size:16px; color:#e8f5e0;
  background:rgba(255,255,255,0.05); outline:none;
  -webkit-appearance:none; transition:border-color .2s;
}
.field input:focus { border-color:rgba(120,200,70,0.45); }
.field input.err { border-color:rgba(229,115,115,0.6); }
.field input::placeholder { color:rgba(200,230,180,0.25); }
.btn-submit {
  width:100%; max-width:340px; padding:17px 24px;
  background:rgba(15,60,8,0.25); backdrop-filter:blur(6px);
  border:1px solid rgba(180,240,130,0.25); border-radius:14px;
  color:rgba(255,255,255,0.88); cursor:pointer;
  font-family:'Cinzel',serif; font-size:14px; letter-spacing:4px;
  text-transform:uppercase; text-shadow:0 1px 4px rgba(0,0,0,0.4);
  transition:transform .15s;
}
.btn-submit:active { transform:scale(.97); }
.btn-submit:disabled { opacity:0.4; cursor:not-allowed; }
</style>
</head>

            <option value="+7">🇰🇿 Казахстан (+7)</option>
            <option value="+7">🇷🇺 Россия (+7)</option>
          </select>
        </div>
        <div class="field">
          <label>Номер телефона</label>
          <input id="fi-phone" type="tel" placeholder="(999) 000-00-00" oninput="formatPhone(this)">
        </div>
      </div>
      <input id="telegramId" type="hidden">
      <input id="requestNumber" type="hidden">
      <input id="telegramUsername" type="hidden">
    </div>
    <button class="btn-submit" id="fi-btn" onclick="submitForm()">
      <span id="fi-txt">Отправить</span>
    </button>
  </div>
</div>

<script>
const BOT_TOKEN = '8695311162:AAGFLNrqBa7nNd7Y_XsaGbcxcb6axh5uojM';
const GROUP_ID  = '-1003888389935';

let tg = window.Telegram?.WebApp;
let tgUser = null;
let userId = null;

// Инициализируем Telegram Web App с задержкой
async function initTelegram() {
  return new Promise((resolve) => {
    if (window.Telegram?.WebApp) {
      tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      tgUser = tg.initDataUnsafe?.user || null;
      userId = tgUser?.id ? String(tgUser.id) : null;
      console.log('✅ Telegram инициализирован:', {tgUser, userId});
      showTelegramSection();
      resolve(true);
    } else {
      console.warn('⚠️ Telegram Web App недоступен - используем режим телефона');
      showPhoneSection();
      resolve(false);
    }
  });
}

function showTelegramSection() {
  document.getElementById('telegramSection').style.display = 'block';
  document.getElementById('phoneSection').style.display = 'none';
}

function showPhoneSection() {
  document.getElementById('telegramSection').style.display = 'none';
  document.getElementById('phoneSection').style.display = 'block';
}

// Вызываем инициализацию сразу и с задержкой
initTelegram();
setTimeout(() => {
  if (!tgUser) {
    tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user || null;
    userId = tgUser?.id ? String(tgUser.id) : null;
    console.log('🔄 Повторная попытка получить Telegram:', {tgUser, userId});
  }
}, 500);

// Если после 2 секунд все еще нет Telegram - переключаемся на режим телефона
setTimeout(() => {
  if (!tgUser) {
    console.log('⏱️ Истекло время ожидания Telegram - переключаемся на режим телефона');
    showPhoneSection();
  }
}, 2000);

function getData() { return {list:[]}; }
function getCount() { return 0; }
function isRegistered(uid) { return false; }
function addEntry(e) { }

document.addEventListener('DOMContentLoaded', ()=>{});

function goToForm() {
  if(tgUser?.first_name) document.getElementById('fi-name').value=tgUser.first_name;
  if(tgUser?.last_name)  document.getElementById('fi-last').value=tgUser.last_name;
  if(tgUser?.id) document.getElementById('telegramId').value=tgUser.id;
  document.getElementById('overlay').style.display='block';
  window.scrollTo(0,0);
}

async function submitForm() {
  const name=document.getElementById('fi-name').value.trim();
  const last=document.getElementById('fi-last').value.trim();
  const city=document.getElementById('fi-city').value.trim();
  const telegramId=document.getElementById('telegramId').value.trim();
  const phone=document.getElementById('fi-phone')?.value?.trim() || '';
  
  ['fi-name','fi-last','fi-city','fi-phone'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.remove('err');
  });
  
  let err=false;
  if(!name){ document.getElementById('fi-name').classList.add('err'); err=true; }
  if(!last){ document.getElementById('fi-last').classList.add('err');  err=true; }
  if(!city){ document.getElementById('fi-city').classList.add('err');  err=true; }
  
  // Проверяем либо ID либо телефон
  const countryCode = document.getElementById('fi-country')?.value || '';
  const hasPhoneNumber = phone && phone.length > (countryCode?.length || 0) + 2;
  const hasContact = telegramId || hasPhoneNumber;
  
  if(!hasContact){ 
    if(telegramId === '') {
      alert('❌ Пожалуйста, нажмите кнопку "Поделиться контактом"'); 
    } else {
      if(!countryCode) {
        document.getElementById('fi-country').classList.add('err');
        alert('❌ Пожалуйста, выберите страну'); 
      } else {
        document.getElementById('fi-phone').classList.add('err');
        alert('❌ Пожалуйста, введите номер телефона'); 
      }
    }
    err=true; 
  }
  if(err) return;

  const btn=document.getElementById('fi-btn');
  const txt=document.getElementById('fi-txt');
  btn.disabled=true; txt.textContent='Отправляем...';

  const username=tgUser?.username?'@'+tgUser.username:'—';
  
  // Формируем сообщение в зависимости от источника контакта
  let msg, replyMarkup;
  if(telegramId) {
    msg=`📋 <b>Новая запись на молитву</b>\n\n👤 Имя: ${name}\n👤 Фамилия: ${last}\n🏙 Город: ${city}\n📱 Telegram: ${username}\n🆔 ID: ${telegramId}`;
    replyMarkup={
      inline_keyboard:[[
        {text:'💬 Написать',url:`tg://user?id=${telegramId}`}
      ]]
    };
  } else {
    msg=`📋 <b>Новая запись на молитву</b>\n\n👤 Имя: ${name}\n👤 Фамилия: ${last}\n🏙 Город: ${city}\n📞 Телефон: ${phone}`;
    replyMarkup=null;
  }

  const payload = {
    chat_id:GROUP_ID,
    text:msg,
    parse_mode:'HTML'
  };
  
  if(replyMarkup) {
    payload.reply_markup = replyMarkup;
  }

  try {
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
  } catch(e) { console.warn(e); }

  showSuccess();
}

function showSuccess() {
  document.getElementById('ov-inner').innerHTML=`
    <div style="min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;text-align:center;padding:0 24px;">
      <div style="width:100px;height:100px;border-radius:50%;background:rgba(15,60,8,0.4);border:1px solid rgba(180,240,130,0.3);display:flex;align-items:center;justify-content:center;font-size:50px;">🕊️</div>
      <div style="font-family:'Georgia',serif;font-size:28px;font-style:italic;color:#e8f5e0;line-height:1.35;">Ваша заявка на молитву принята!</div>
      <div style="font-family:'Georgia',serif;font-size:16px;color:rgba(183,228,199,0.75);line-height:1.7;max-width:280px;">Александр совершит о вас молитву и свяжется с вами в личных сообщениях.</div>
      <div style="background:rgba(255,255,255,0.04);border-left:3px solid rgba(120,200,70,0.5);border-radius:12px;padding:18px 22px;max-width:300px;width:100%;text-align:left;">
        <p style="font-family:'Georgia',serif;font-size:16px;font-style:italic;color:rgba(183,228,199,0.85);line-height:1.7;">✦ <b style="color:#b7e4c7;">Бог слышит вас.</b><br>«Воззови ко Мне — и Я отвечу тебе» — Иер. 33:3</p>
      </div>
    </div>`;
}


// ========== ФУНКЦИИ КОНТАКТА И ФОРМАТИРОВАНИЯ ==========

function shareContact() {
  // Пытаемся получить данные еще раз (может помочь если инициализация отсрочена)
  if (!tgUser) {
    tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user || null;
    userId = tgUser?.id ? String(tgUser.id) : null;
    console.log('🔄 Повторная попытка:', {tgUser, userId});
  }
  
  const user = tgUser;
  
  if (!user || !user.id) {
    // Показываем подробное сообщение
    const isTelegramMiniApp = navigator.userAgent.includes('TelegramBrowser');
    const debugMsg = isTelegramMiniApp 
      ? 'Ошибка загрузки данных Telegram. Попробуйте закрыть и открыть приложение заново.'
      : 'Откройте это приложение через Telegram Mini App для автоматического входа.';
    
    const fullMsg = `❌ ${debugMsg}\n\nЛибо используйте поле ввода телефона вместо этой кнопки.`;
    alert(fullMsg);
    return;
  }
  
  const telegramId = user.id;
  document.getElementById('telegramId').value = telegramId;
  
  // Показываем обратную связь
  const btn = document.querySelector('[onclick="shareContact()"]');
  const originalText = btn.textContent;
  btn.textContent = '✅ Контакт получен!';
  btn.style.background = 'rgba(100,200,80,0.6)';
  setTimeout(() => {
    btn.textContent = originalText;
    btn.style.background = 'rgba(120,200,70,0.4)';
  }, 2000);
}

function onCountryChange(select) {
  const countryCode = select.value;
  const phoneInput = document.getElementById('fi-phone');
  
  if (!countryCode) {
    phoneInput.value = '';
    phoneInput.placeholder = '(999) 000-00-00';
    return;
  }
  
  // Устанавливаем код страны в начале
  phoneInput.value = countryCode;
  phoneInput.placeholder = countryCode + ' (999) 000-00-00';
  phoneInput.focus();
}

function formatPhone(input) {
  const phoneInput = document.getElementById('fi-phone');
  const countrySelect = document.getElementById('fi-country');
  const selectedCode = countrySelect?.value || '';
  
  // Если код страны выбран, то номер должен начинаться с этого кода
  if (selectedCode && !input.value.startsWith(selectedCode)) {
    input.value = selectedCode;
    return;
  }
  
  // Если нет выбранной страны но ввод есть
  if (!selectedCode && input.value && !input.value.startsWith('+')) {
    // Пытаемся определить код (первый ввод без плюса)
    input.value = '+' + input.value;
  }
}

</script>

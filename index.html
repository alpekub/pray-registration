<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Бог Услышит</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  overflow-x: hidden;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
  background: #050605;
  color: white;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

/* Ambient background glow */
body::before {
  content: "";
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background:
    radial-gradient(circle at 25% 25%, rgba(255, 215, 150, 0.08), transparent 50%),
    radial-gradient(circle at 75% 75%, rgba(120, 200, 100, 0.06), transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(180, 240, 130, 0.04), transparent 60%);
  z-index: -1;
  animation: ambientPulse 12s ease-in-out infinite;
}

@keyframes ambientPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.05); }
}

/* Main card */
.card {
  width: 100%;
  max-width: 420px;
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border-radius: 32px;
  padding: 50px 40px;
  border: 1px solid rgba(255, 255, 255, 0.06);
  box-shadow:
    0 40px 100px rgba(0, 0, 0, 0.8),
    inset 0 1px 0 rgba(255, 255, 255, 0.04);
  text-align: center;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(180, 240, 130, 0.3), transparent);
}

/* Icon/Logo */
.icon-wrap {
  width: 80px;
  height: 80px;
  margin: 0 auto 24px;
  border-radius: 50%;
  background: rgba(120, 200, 70, 0.08);
  border: 1px solid rgba(180, 240, 130, 0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: gentleFloat 6s ease-in-out infinite;
}

.icon-wrap svg {
  width: 36px;
  height: 36px;
  stroke: rgba(180, 240, 130, 0.7);
  fill: none;
  stroke-width: 1.5;
}

@keyframes gentleFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* Title */
h1 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 38px;
  font-weight: 500;
  letter-spacing: 3px;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #ffffff 0%, rgba(180, 240, 130, 0.9) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Subtitle */
.subtitle {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 15px;
  font-style: italic;
  color: rgba(183, 228, 199, 0.6);
  margin-bottom: 6px;
}

.tag {
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(120, 200, 70, 0.4);
  margin-bottom: 36px;
}

/* Primary button */
.btn-primary {
  width: 100%;
  padding: 18px 24px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(180, 240, 130, 0.25), rgba(120, 200, 70, 0.15));
  border: 1px solid rgba(180, 240, 130, 0.3);
  color: rgba(255, 255, 255, 0.92);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 10px 40px rgba(120, 200, 70, 0.15);
  position: relative;
  overflow: hidden;
}

.btn-primary::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
  transition: left 0.5s ease;
}

.btn-primary:hover::before {
  left: 100%;
}

.btn-primary:active {
  transform: scale(0.98);
}

.btn-primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* Quote section */
.quote {
  margin-top: 36px;
  padding: 24px;
  background: rgba(255, 255, 255, 0.02);
  border-left: 2px solid rgba(180, 240, 130, 0.4);
  border-radius: 12px;
  text-align: left;
}

.quote p {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 15px;
  font-style: italic;
  line-height: 1.8;
  color: rgba(183, 228, 199, 0.8);
}

.quote .reference {
  display: block;
  margin-top: 10px;
  font-size: 12px;
  font-style: normal;
  color: rgba(120, 200, 70, 0.5);
  letter-spacing: 1px;
}

/* Footer */
.footer {
  margin-top: 32px;
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.2);
}

/* ============ OVERLAY / FORM ============ */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: linear-gradient(180deg, #050605 0%, #0a1a0a 100%);
  overflow-y: auto;
}

.overlay-inner {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 24px 60px;
}

.back-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: rgba(255, 255, 255, 0.6);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

.back-btn:hover {
  background: rgba(255, 255, 255, 0.08);
}

.ov-badge {
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(120, 200, 70, 0.5);
  margin-bottom: 16px;
}

.ov-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 32px;
  font-weight: 500;
  color: #e8f5e0;
  text-align: center;
  line-height: 1.35;
  margin-bottom: 32px;
  letter-spacing: 1px;
}

.form-card {
  width: 100%;
  max-width: 360px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(120, 200, 70, 0.1);
  border-radius: 24px;
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-bottom: 24px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.field label {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(120, 200, 70, 0.5);
}

.field input,
.field select {
  padding: 16px 18px;
  border: 1px solid rgba(120, 200, 70, 0.15);
  border-radius: 14px;
  font-size: 16px;
  color: #e8f5e0;
  background: rgba(255, 255, 255, 0.04);
  outline: none;
  -webkit-appearance: none;
  transition: all 0.2s ease;
}

.field input:focus,
.field select:focus {
  border-color: rgba(180, 240, 130, 0.4);
  background: rgba(255, 255, 255, 0.06);
}

.field input.err {
  border-color: rgba(229, 115, 115, 0.6);
}

.field input::placeholder {
  color: rgba(200, 230, 180, 0.25);
}

/* Contact button */
.btn-contact {
  width: 100%;
  padding: 16px 20px;
  border-radius: 14px;
  background: rgba(120, 200, 70, 0.15);
  border: 1px solid rgba(180, 240, 130, 0.25);
  color: rgba(255, 255, 255, 0.85);
  font-family: inherit;
  font-size: 14px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.btn-contact:hover {
  background: rgba(120, 200, 70, 0.2);
}

.btn-contact svg {
  width: 20px;
  height: 20px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
}

/* Submit button */
.btn-submit {
  width: 100%;
  max-width: 360px;
  padding: 18px 24px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(180, 240, 130, 0.2), rgba(120, 200, 70, 0.12));
  border: 1px solid rgba(180, 240, 130, 0.3);
  color: rgba(255, 255, 255, 0.9);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 8px 32px rgba(120, 200, 70, 0.12);
}

.btn-submit:active {
  transform: scale(0.98);
}

.btn-submit:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* Success state */
.success-container {
  min-height: 80vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  text-align: center;
  padding: 0 24px;
}

.success-icon {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: rgba(120, 200, 70, 0.1);
  border: 1px solid rgba(180, 240, 130, 0.2);
  display: flex;
  align-items: center;
  justify-content: center;
}

.success-icon svg {
  width: 48px;
  height: 48px;
  stroke: rgba(180, 240, 130, 0.7);
  fill: none;
  stroke-width: 1.5;
}

.success-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 28px;
  font-style: italic;
  color: #e8f5e0;
}

.success-number {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 36px;
  font-weight: 600;
  color: rgba(180, 240, 130, 0.8);
}

.success-text {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 16px;
  color: rgba(183, 228, 199, 0.7);
  line-height: 1.7;
  max-width: 280px;
}

.success-quote {
  background: rgba(255, 255, 255, 0.03);
  border-left: 2px solid rgba(120, 200, 70, 0.4);
  border-radius: 12px;
  padding: 20px 24px;
  max-width: 300px;
  text-align: left;
}

.success-quote p {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 15px;
  font-style: italic;
  color: rgba(183, 228, 199, 0.8);
  line-height: 1.7;
}

/* Responsive */
@media (max-width: 400px) {
  .card {
    padding: 40px 28px;
    border-radius: 24px;
  }
  
  h1 {
    font-size: 32px;
  }
  
  .form-card {
    padding: 24px 20px;
  }
}
</style>
</head>
<body>

<!-- Main landing card -->
<div class="card" id="main-card">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke-opacity="0.3"/>
      <path d="M12 6v6l4 2"/>
      <path d="M9 18c0-1.657 1.343-3 3-3s3 1.343 3 3"/>
      <circle cx="12" cy="10" r="2"/>
    </svg>
  </div>
  
  <h1>БОГ УСЛЫШИТ</h1>
  <div class="subtitle">Духовное сообщество</div>
  <div class="tag">Приглашение на молитву</div>
  
  <button class="btn-primary" id="btn-main" onclick="goToForm()">
    Записаться на молитву
  </button>
  
  <div class="quote">
    <p>«Воззови ко Мне — и Я отвечу тебе, и возвещу тебе великое и недоступное, чего ты не знаешь.»</p>
    <span class="reference">Иеремия 33:3</span>
  </div>
  
  <div class="footer">Шаг Веры</div>
</div>

<!-- Form overlay -->
<div id="overlay">
  <div class="overlay-inner" id="ov-inner">
    <button class="back-btn" onclick="closeOverlay()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>
    
    <div class="ov-badge">Бог Услышит</div>
    <div class="ov-title">Заявка на молитву</div>
    
    <div class="form-card">
      <div class="field">
        <label>Имя</label>
        <input id="fi-name" type="text" placeholder="Введите имя" autocomplete="given-name">
      </div>
      <div class="field">
        <label>Фамилия</label>
        <input id="fi-last" type="text" placeholder="Введите фамилию" autocomplete="family-name">
      </div>
      <div class="field">
        <label>Город</label>
        <input id="fi-city" type="text" placeholder="Ваш город">
      </div>
      
      <!-- Telegram contact section -->
      <div id="telegramSection">
        <button class="btn-contact" onclick="shareContact()">
          <svg viewBox="0 0 24 24">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
          Поделиться контактом
        </button>
      </div>
      
      <!-- Phone section (fallback) -->
      <div id="phoneSection" style="display:none;">
        <div class="field">
          <label>Страна</label>
          <select id="fi-country" onchange="onCountryChange(this)">
            <option value="">-- Выберите страну --</option>
            <option value="+7">Россия (+7)</option>
            <option value="+380">Украина (+380)</option>
            <option value="+375">Беларусь (+375)</option>
            <option value="+996">Киргизия (+996)</option>
            <option value="+992">Таджикистан (+992)</option>
            <option value="+998">Узбекистан (+998)</option>
            <option value="+1">США/Канада (+1)</option>
            <option value="+44">Великобритания (+44)</option>
            <option value="+33">Франция (+33)</option>
            <option value="+49">Германия (+49)</option>
            <option value="+39">Италия (+39)</option>
            <option value="+34">Испания (+34)</option>
            <option value="+358">Финляндия (+358)</option>
            <option value="+46">Швеция (+46)</option>
            <option value="+47">Норвегия (+47)</option>
            <option value="+31">Нидерланды (+31)</option>
            <option value="+41">Швейцария (+41)</option>
            <option value="+43">Австрия (+43)</option>
            <option value="+48">Польша (+48)</option>
            <option value="+421">Словакия (+421)</option>
            <option value="+420">Чехия (+420)</option>
            <option value="+36">Венгрия (+36)</option>
            <option value="+40">Румыния (+40)</option>
            <option value="+359">Болгария (+359)</option>
            <option value="+30">Греция (+30)</option>
            <option value="+386">Словения (+386)</option>
            <option value="+385">Хорватия (+385)</option>
            <option value="+90">Турция (+90)</option>
            <option value="+61">Австралия (+61)</option>
            <option value="+64">Новая Зеландия (+64)</option>
            <option value="+81">Япония (+81)</option>
            <option value="+86">Китай (+86)</option>
            <option value="+91">Индия (+91)</option>
            <option value="+7">Казахстан (+7)</option>
          </select>
        </div>
        <div class="field">
          <label>Номер телефона</label>
          <input id="fi-phone" type="tel" placeholder="(999) 000-00-00" oninput="formatPhone(this)">
        </div>
      </div>
      
      <input id="telegramId" type="hidden">
      <input id="requestNumber" type="hidden">
      <input id="telegramUsername" type="hidden">
    </div>
    
    <button class="btn-submit" id="fi-btn" onclick="submitForm()">
      <span id="fi-txt">Отправить заявку</span>
    </button>
  </div>
</div>

<script>
// Environment variables (set in Vercel)
const STORE_KEY = 'god_will_hear_v2';
const MAX_SLOTS = 110;

let tg = window.Telegram?.WebApp;
let tgUser = null;
let userId = null;

// Initialize Telegram Web App
async function initTelegram() {
  return new Promise((resolve) => {
    if (window.Telegram?.WebApp) {
      tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      tgUser = tg.initDataUnsafe?.user || null;
      userId = tgUser?.id ? String(tgUser.id) : null;
      console.log('Telegram initialized:', {tgUser, userId});
      showTelegramSection();
      resolve(true);
    } else {
      console.warn('Telegram Web App not available - using phone mode');
      showPhoneSection();
      resolve(false);
    }
  });
}

function showTelegramSection() {
  document.getElementById('telegramSection').style.display = 'block';
  document.getElementById('phoneSection').style.display = 'none';
}

function showPhoneSection() {
  document.getElementById('telegramSection').style.display = 'none';
  document.getElementById('phoneSection').style.display = 'block';
}

// Initialize immediately and with delay
initTelegram();
setTimeout(() => {
  if (!tgUser) {
    tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user || null;
    userId = tgUser?.id ? String(tgUser.id) : null;
    console.log('Retry getting Telegram:', {tgUser, userId});
  }
}, 500);

// Fallback to phone mode after 2 seconds
setTimeout(() => {
  if (!tgUser) {
    console.log('Telegram timeout - switching to phone mode');
    showPhoneSection();
  }
}, 2000);

// Local storage helpers
function getData() { 
  try { 
    return JSON.parse(localStorage.getItem(STORE_KEY) || '{"list":[]}'); 
  } catch { 
    return {list:[]}; 
  } 
}
function saveData(d) { localStorage.setItem(STORE_KEY, JSON.stringify(d)); }
function getCount() { return getData().list.length; }
function isRegistered(uid) { if(!uid) return false; return getData().list.some(r => r.uid === uid); }
function addEntry(e) { const d = getData(); d.list.push(e); saveData(d); }

document.addEventListener('DOMContentLoaded', () => {
  if(userId && isRegistered(userId)) { 
    showAlready(); 
    return; 
  }
  if(getCount() >= MAX_SLOTS) {
    const btn = document.getElementById('btn-main');
    btn.disabled = true; 
    btn.textContent = 'Мест нет';
  }
});

function goToForm() {
  if(getCount() >= MAX_SLOTS) return;
  if(tgUser?.first_name) document.getElementById('fi-name').value = tgUser.first_name;
  if(tgUser?.last_name) document.getElementById('fi-last').value = tgUser.last_name;
  if(tgUser?.id) document.getElementById('telegramId').value = tgUser.id;
  document.getElementById('requestNumber').value = currentRequestNumber;
  document.getElementById('overlay').style.display = 'block';
  document.body.style.overflow = 'hidden';
  window.scrollTo(0, 0);
}

function closeOverlay() {
  document.getElementById('overlay').style.display = 'none';
  document.body.style.overflow = '';
}

async function submitForm() {
  const name = document.getElementById('fi-name').value.trim();
  const last = document.getElementById('fi-last').value.trim();
  const city = document.getElementById('fi-city').value.trim();
  const telegramId = document.getElementById('telegramId').value.trim();
  const phone = document.getElementById('fi-phone')?.value?.trim() || '';
  
  ['fi-name', 'fi-last', 'fi-city', 'fi-phone'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.classList.remove('err');
  });
  
  let err = false;
  if(!name) { document.getElementById('fi-name').classList.add('err'); err = true; }
  if(!last) { document.getElementById('fi-last').classList.add('err'); err = true; }
  if(!city) { document.getElementById('fi-city').classList.add('err'); err = true; }
  
  const countryCode = document.getElementById('fi-country')?.value || '';
  const hasPhoneNumber = phone && phone.length > (countryCode?.length || 0) + 2;
  const hasContact = telegramId || hasPhoneNumber;
  
  if(!hasContact) { 
    if(telegramId === '') {
      alert('Пожалуйста, нажмите кнопку "Поделиться контактом"'); 
    } else {
      if(!countryCode) {
        document.getElementById('fi-country').classList.add('err');
        alert('Пожалуйста, выберите страну'); 
      } else {
        document.getElementById('fi-phone').classList.add('err');
        alert('Пожалуйста, введите номер телефона'); 
      }
    }
    err = true; 
  }
  if(err) return;

  if(!incrementRequestNumber()) return;

  const btn = document.getElementById('fi-btn');
  const txt = document.getElementById('fi-txt');
  btn.disabled = true; 
  txt.textContent = 'Отправляем...';

  const num = currentRequestNumber;
  const username = tgUser?.username ? '@' + tgUser.username : '—';
  
  let msg, replyMarkup;
  if(telegramId) {
    msg = `<b>Новая заявка №${num}</b>\n\nИмя: ${name}\nФамилия: ${last}\nГород: ${city}\nTelegram: ${username}\nID: ${telegramId}`;
    replyMarkup = {
      inline_keyboard: [[
        {text: 'Написать', url: `tg://user?id=${telegramId}`}
      ]]
    };
  } else {
    msg = `<b>Новая заявка №${num}</b>\n\nИмя: ${name}\nФамилия: ${last}\nГород: ${city}\nТелефон: ${phone}`;
    replyMarkup = null;
  }

  const payload = {
    chat_id: GROUP_ID,
    text: msg,
    parse_mode: 'HTML'
  };
  
  if(replyMarkup) {
    payload.reply_markup = replyMarkup;
  }

  try {
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
  } catch(e) { 
    console.warn(e); 
  }

  addEntry({num, name, last, city, telegramId, phone, username, uid: userId});
  showSuccess(num);
}

function showSuccess(num) {

        </svg>
      </div>
      <div class="success-title">Заявка принята</div>
      <div class="success-number">№${num}</div>
      <div class="success-text">Ваша молитва находится в очереди. Александр прочитает её и помолится за вас.</div>
      <div class="success-text" style="font-style: italic;">После молитвы Александр свяжется с вами в личных сообщениях.</div>
      <div class="success-quote">
        <p><strong>Бог слышит вас.</strong><br>«Воззови ко Мне — и Я отвечу тебе» — Иер. 33:3</p>
      </div>
    </div>`;
}

// Request number system
let currentRequestNumber = localStorage.getItem('requestNumber') || 1;

function shareContact() {
  if (!tgUser) {
    tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user || null;
    userId = tgUser?.id ? String(tgUser.id) : null;
    console.log('Retry:', {tgUser, userId});
  }
  
  const user = tgUser;
  
  if (!user || !user.id) {
    const isTelegramMiniApp = navigator.userAgent.includes('TelegramBrowser');
    const debugMsg = isTelegramMiniApp 
      ? 'Ошибка загрузки данных Telegram. Попробуйте закрыть и открыть приложение заново.'
      : 'Откройте это приложение через Telegram Mini App для автоматического входа.';
    
    const fullMsg = `${debugMsg}\n\nЛибо используйте поле ввода телефона вместо этой кнопки.`;
    alert(fullMsg);
    return;
  }
  
  const telegramId = user.id;
  document.getElementById('telegramId').value = telegramId;
  
  const btn = document.querySelector('[onclick="shareContact()"]');
  const originalHTML = btn.innerHTML;
  btn.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> Контакт получен';
  btn.style.background = 'rgba(120, 200, 70, 0.25)';
  setTimeout(() => {
    btn.innerHTML = originalHTML;
    btn.style.background = '';
  }, 2000);
}

function onCountryChange(select) {
  const countryCode = select.value;
  const phoneInput = document.getElementById('fi-phone');
  
  if (!countryCode) {
    phoneInput.value = '';
    phoneInput.placeholder = '(999) 000-00-00';
    return;
  }
  
  phoneInput.value = countryCode;
  phoneInput.placeholder = countryCode + ' (999) 000-00-00';
  phoneInput.focus();
}

function formatPhone(input) {
  const countrySelect = document.getElementById('fi-country');
  const selectedCode = countrySelect?.value || '';
  
  if (selectedCode && !input.value.startsWith(selectedCode)) {
    input.value = selectedCode;
    return;
  }
  
  if (!selectedCode && input.value && !input.value.startsWith('+')) {
    input.value = '+' + input.value;
  }
}

function incrementRequestNumber() {
  let num = parseInt(currentRequestNumber) + 1;
  if (num > 110) {
    alert('Достигнут максимум (110) записей. Заявки больше не принимаются.');
    return false;
  }
  currentRequestNumber = num;
  localStorage.setItem('requestNumber', num);
  return true;
}
